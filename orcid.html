<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ORCID Linking</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const supabase = supabase.createClient(
      "https://YOUR_PROJECT_ID.supabase.co",
      "YOUR_PUBLIC_ANON_KEY"
    );

    async function protectPage() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        window.location.href = "index.html";
      }
    }

    protectPage();
  </script>
</head>
<body>
  <h1>Link Your ORCID</h1>
  <form id="orcidForm">
    <input type="text" id="orcid" placeholder="0000-0002-1825-0097" required>
    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="affiliation" placeholder="Affiliation">
    <button type="submit">Save Profile</button>
  </form>

  <script>
    document.getElementById("orcidForm").onsubmit = async (e) => {
      e.preventDefault();

      const orcid = document.getElementById("orcid").value;
      const name = document.getElementById("name").value;
      const affiliation = document.getElementById("affiliation").value;

      const { data: { user } } = await supabase.auth.getUser();

      const { error } = await supabase.from("profiles").insert({
        id: user.id,
        orcid,
        full_name: name,
        affiliation
      });

      if (!error) {
        window.location.href = "index.html";
      } else {
        alert(error.message);
      }
    };
  </script>
</body>
</html>
